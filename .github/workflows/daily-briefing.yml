name: daily-briefing

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  daily-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Claude Code install
        run: npm install -g @anthropic-ai/claude-code

      - name: DART collect
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          TODAY=$(date +%Y%m%d)
          curl -s "https://opendart.fss.or.kr/api/list.json?crtfc_key=${DART_API_KEY}&bgn_de=${TODAY}&end_de=${TODAY}&pblntf_ty=A&page_count=40" -o dart_today.json
          python3 - << 'PYEOF'
          import json
          data = json.load(open('dart_today.json'))
          items = data.get('list', [])
          result = []
          keywords = ['잠정실적', '배당', '자기주식', '수주', '계약']
          for item in items:
              t = item.get('report_nm', '')
              if any(k in t for k in keywords):
                  result.append('- [' + item.get('corp_name','') + '] ' + t)
          print('\n'.join(result[:20]) if result else 'no major disclosure')
          PYEOF
          > dart_summary.txt
          cat dart_summary.txt

      - name: Generate briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          DART_DATA=$(cat dart_summary.txt)
          claude --dangerously-skip-permissions -p "Read Notion hub page(https://www.notion.so/33fcacd2533f81f28e70edda65c9d116) and generate today morning investment briefing, save to Notion DB. Today DART disclosures: ${DART_DATA}. Stock selection: 1.Interim earnings surprise 2.Treasury stock(positive) 3.Large contract(momentum) 4.Dividend(shareholder return) 5.Rights offering(dilution risk). Save 5 stocks to Watchlist DB(ace8cd77-6ebf-4b0c-bca9-8d056aabdfd3)."
