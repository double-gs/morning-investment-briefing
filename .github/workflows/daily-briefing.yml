name: daily-briefing

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  daily-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: DART collect
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          TODAY=$(date +%Y%m%d)
          curl -s "https://opendart.fss.or.kr/api/list.json?crtfc_key=${DART_API_KEY}&bgn_de=${TODAY}&end_de=${TODAY}&pblntf_ty=A&page_count=40" -o dart_today.json
          python3 - << 'PYEOF'
          import json
          data = json.load(open('dart_today.json'))
          items = data.get('list', [])
          result = []
          keywords = ['잠정실적', '배당', '자기주식', '수주', '계약']
          for item in items:
              t = item.get('report_nm', '')
              if any(k in t for k in keywords):
                  result.append('- [' + item.get('corp_name','') + '] ' + t)
          print('\n'.join(result[:20]) if result else 'no major disclosure')
          PYEOF
          > dart_summary.txt
          cat dart_summary.txt

      - name: Generate briefing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          export DART_DATA=$(cat dart_summary.txt)
          export TODAY=$(date +%Y-%m-%d)
          python3 << 'PYEOF'
          import os, json, urllib.request, urllib.error, time
          api_key = os.environ['GEMINI_API_KEY']
          notion_token = os.environ['NOTION_TOKEN']
          dart_data = os.environ.get('DART_DATA', 'no major disclosure')
          today = os.environ.get('TODAY', '')
          print("API KEY (first 10 chars):", api_key[:10] if api_key else 'EMPTY')
          prompt = "당신은 한국 주식 투자 전문가입니다. 오늘 날짜: " + today + "\n오늘 DART 주요 공시:\n" + dart_data + "\n\n다음 구조로 아침 투자 브리핑 유튜브 대본을 작성해주세요:\n[HOOK] 오프닝 (0~15초)\n[INTRO] 소개 + 주제 안내 (15~30초)\n[SECTION 1] 지난주 시장 요약 (30초~2분)\n[SECTION 2] 오늘의 핵심 변수 (2~4분)\n[SECTION 3] 오늘 주목할 종목 5선 (4~6분) - 공시 기반 선정\n[SECTION 4] 오늘 투자 전략 (6~7분)\n[OUTRO] 마무리 + 구독유도 (7~8분)"
          url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=" + api_key
          print("Using model: gemini-1.5-pro (v1beta API)")
          body = json.dumps({"contents": [{"parts": [{"text": prompt}]}], "generationConfig": {"temperature": 0.7, "maxOutputTokens": 4000}}).encode()
          briefing_text = None
          for attempt in range(5):
              try:
                  req = urllib.request.Request(url, data=body, headers={"Content-Type": "application/json"})
                  with urllib.request.urlopen(req) as resp:
                      result = json.loads(resp.read())
                  briefing_text = result['candidates'][0]['content']['parts'][0]['text']
                  print("브리핑 생성 완료 (시도 " + str(attempt+1) + ")")
                  break
              except urllib.error.HTTPError as e:
                  error_body = e.read().decode('utf-8', errors='replace')
                  print("HTTP Error " + str(e.code) + ": " + str(e.reason))
                  print("Error body:", error_body[:500])
                  if e.code == 429:
                      wait = 60 * (attempt + 1)
                      print("429 Too Many Requests - " + str(wait) + "초 대기 후 재시도... (시도 " + str(attempt+1) + "/5)")
                      time.sleep(wait)
                  else:
                      raise
          if briefing_text is None:
              raise Exception("5회 재시도 후에도 Gemini API 호출 실패")
          ai_summary = briefing_text[:200].replace('\n', ' ')
          notion_db_id = "f2823ae6e16b4606ad7caa2345cda3b6"
          notion_url = "https://api.notion.com/v1/pages"
          notion_body = json.dumps({"parent": {"database_id": notion_db_id}, "properties": {"브리핑 제목": {"title": [{"text": {"content": today + " 아침 브리핑"}}]}, "AI 요약": {"rich_text": [{"text": {"content": ai_summary}}]}, "날짜": {"date": {"start": today}}, "상태": {"select": {"name": "초안"}}, "콘텐츠 유형": {"select": {"name": "유튜브 대본"}}}, "children": [{"object": "block", "type": "paragraph", "paragraph": {"rich_text": [{"text": {"content": briefing_text[:2000]}}]}}]}, ensure_ascii=False).encode('utf-8')
          notion_req = urllib.request.Request(notion_url, data=notion_body, headers={"Authorization": "Bearer " + notion_token, "Content-Type": "application/json", "Notion-Version": "2022-06-28"})
          with urllib.request.urlopen(notion_req) as resp:
              notion_result = json.loads(resp.read())
          print("Notion 저장 완료:", notion_result.get('id', 'unknown'))
          PYEOF
